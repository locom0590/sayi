<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kognitif VR Sayı Oyunu - Gelişmiş Geri Bildirim</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; font-family: sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #vr-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        .vr-start-btn {
            background: #2563eb; color: white; border: none; padding: 20px 40px;
            font-size: 20px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
            margin-top: 20px;
            z-index: 1001;
        }
        #btn-calibrate {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 12px 24px; border-radius: 20px; cursor: pointer; display: none;
            backdrop-filter: blur(5px); font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>
</head>
<body>

    <div id="vr-overlay">
        <h2>KOGNİTİF VR SAYI OYUNU</h2>
        <p>Lütfen telefonunuzu yatay konuma getirin.</p>
        <button class="vr-start-btn" id="btn-start">OYUNU BAŞLAT</button>
    </div>

    <button id="btn-calibrate">BAKIŞI SIFIRLA</button>
    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, effect;
        let container = document.getElementById('canvas-container');
        
        let rawSensorQuaternion = new THREE.Quaternion();
        let calibratedTarget = new THREE.Quaternion();   
        let currentQuaternion = new THREE.Quaternion();  
        let sensorBiasQuaternion = new THREE.Quaternion();
        
        const SMOOTH_FACTOR = 0.12; 
        const zee = new THREE.Vector3(0, 0, 1);
        const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        let raycaster = new THREE.Raycaster();
        let centerPointer = new THREE.Vector2(0, 0); 
        let reticleMesh; 
        
        let targetNumbers = []; 
        let currentTargetNumber = 1; 
        let maxNumberInLevel = 4; 
        let isMovementMode = false; 
        
        let gazeTimer = 0; 
        const GAZE_TIME_REQUIRED = 1.5; 
        let intersectedObject = null; 
        let clock = new THREE.Clock(); 

        let uiTextTexture, uiTextMesh;
        let audioCtx = null; 

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15); 
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime); 
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.4); 
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function onDeviceOrientation(event) {
            if (event.alpha === null) return;
            const alpha = THREE.MathUtils.degToRad(event.alpha);
            const beta = THREE.MathUtils.degToRad(event.beta);
            const gamma = THREE.MathUtils.degToRad(event.gamma);
            rawSensorQuaternion.setFromEuler(new THREE.Euler(beta, alpha, -gamma, 'YXZ'));
        }

        document.getElementById('btn-start').addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', onDeviceOrientation, false);
                            setupGame();
                        } else {
                            alert("Jiroskop izni reddedildi. Ayarlardan tarayıcı izinlerini kontrol edin.");
                        }
                    })
                    .catch(err => {
                        console.log("Sensör kilitli. Fare moduna geçiliyor.");
                        setupFallbackControls();
                        setupGame();
                    });
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, false);
                setTimeout(() => {
                    if (rawSensorQuaternion.lengthSq() === 1) { 
                        setupFallbackControls();
                    }
                }, 1000);
                setupGame();
            }
        });

        function setupFallbackControls() {
            let mouseX = 0, mouseY = 0;
            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * Math.PI * 2 - Math.PI;
                mouseY = (e.clientY / window.innerHeight) * Math.PI - Math.PI / 2;
                rawSensorQuaternion.setFromEuler(new THREE.Euler(-mouseY, mouseX, 0, 'YXZ'));
            });
            window.addEventListener('touchmove', (e) => {
                if(e.touches.length > 0) {
                    let t = e.touches[0];
                    mouseX = (t.clientX / window.innerWidth) * Math.PI * 2 - Math.PI;
                    mouseY = (t.clientY / window.innerHeight) * Math.PI - Math.PI / 2;
                    rawSensorQuaternion.setFromEuler(new THREE.Euler(-mouseY, mouseX, 0, 'YXZ'));
                }
            }, { passive: true });
        }

        function setupGame() {
            window.addEventListener('deviceorientation', onDeviceOrientation, false);

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log("Fullscreen engellendi"));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            document.getElementById('vr-overlay').style.display = 'none';
            document.getElementById('btn-calibrate').style.display = 'block';

            init();
            animate();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050508);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 1.6, 0); 
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                powerPreference: "high-performance",
                precision: "mediump"
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            effect = new THREE.StereoEffect(renderer);
            effect.setEyeSeparation(0.064); 
            effect.setSize(window.innerWidth, window.innerHeight);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);

            const reticleGeo = new THREE.RingGeometry(0.05, 0.09, 32); 
            const reticleMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                side: THREE.DoubleSide, 
                depthTest: false,
                depthWrite: false,
                transparent: true
            });
            reticleMesh = new THREE.Mesh(reticleGeo, reticleMat);
            reticleMesh.renderOrder = 99999; 
            scene.add(reticleMesh); 

            createUIOverlay();
            generateDynamicTargets(); 

            window.addEventListener('resize', onWindowResize, false);
        }

        function createUIOverlay() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            uiTextTexture = new THREE.CanvasTexture(canvas);
            
            updateUIStatus();

            const geometry = new THREE.PlaneGeometry(0.6, 0.15);
            const material = new THREE.MeshBasicMaterial({ map: uiTextTexture, transparent: true, depthTest: false, depthWrite: false });
            uiTextMesh = new THREE.Mesh(geometry, material);
            uiTextMesh.position.set(0, 0.35, -1.4); 
            uiTextMesh.renderOrder = 100000;
            camera.add(uiTextMesh);
        }

        function updateUIStatus() {
            let modeText = isMovementMode ? " [HAREKETLİ]" : "";
            updateUIText("HEDEF: " + currentTargetNumber + " / " + maxNumberInLevel + modeText);
        }

        function updateUIText(text) {
            const ctx = uiTextTexture.image.getContext('2d');
            ctx.clearRect(0, 0, 512, 128);
            ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
            if(ctx.roundRect) ctx.roundRect(0, 0, 512, 128, 20); else ctx.fillRect(0, 0, 512, 128);
            ctx.fill();
            ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 4; ctx.stroke();
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 64);
            uiTextTexture.needsUpdate = true;
        }

        // --- GÜNCELLEME: ÇAP 0.75 KATINA DÜŞÜRÜLDÜ VE MESAFE YARIM DAİRE OLARAK AYARLANDI ---
        function generateDynamicTargets() {
            targetNumbers.forEach(mesh => scene.remove(mesh));
            targetNumbers = [];
            currentTargetNumber = 1;

            const radius = 4;
            // Çap: 1.05. Yarım daire boşlukla beraber aralarındaki min mesafe: Çap * 1.5 = ~1.6 metre
            const minDistanceBetweenObjects = 1.6; 

            for (let num = 1; num <= maxNumberInLevel; num++) {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(128, 128, 110, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = isMovementMode ? '#eab308' : '#3b82f6'; ctx.lineWidth = 8; ctx.stroke();
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 110px sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(num.toString(), 128, 128);

                const texture = new THREE.CanvasTexture(canvas);
                // Boyut 1.4'ten 1.05'e indirildi (Tam olarak 0.75 katı)
                const geometry = new THREE.PlaneGeometry(1.05, 1.05); 
                const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                const mesh = new THREE.Mesh(geometry, material);

                let validPosition = false;
                let posX, posY, posZ;
                let attempts = 0;

                while (!validPosition && attempts < 200) {
                    attempts++;
                    const angleX = (Math.random() * 1.4 - 0.7); 
                    const randomY = 0.6 + (Math.random() * 1.6); 

                    posX = Math.sin(angleX) * radius;
                    posY = randomY;
                    posZ = -Math.cos(angleX) * radius;

                    validPosition = true;
                    for (let j = 0; j < targetNumbers.length; j++) {
                        let other = targetNumbers[j];
                        let dist = Math.sqrt(Math.pow(posX - other.position.x, 2) + Math.pow(posY - other.position.y, 2) + Math.pow(posZ - other.position.z, 2));
                        if (dist < minDistanceBetweenObjects) {
                            validPosition = false;
                            break;
                        }
                    }
                }

                mesh.position.set(posX, posY, posZ);

                mesh.userData = { 
                    number: num,
                    seedX: Math.random() * 10,
                    seedY: Math.random() * 10,
                    baseX: mesh.position.x,
                    baseY: mesh.position.y,
                    isCorrect: false 
                }; 

                scene.add(mesh);
                targetNumbers.push(mesh);
            }
            updateUIStatus();
        }

        function relocateTarget(mesh) {
            const radius = 4;
            const minDistanceBetweenObjects = 1.6; 
            let validPosition = false;
            let posX, posY, posZ;
            let attempts = 0;

            while (!validPosition && attempts < 200) {
                attempts++;
                const angleX = (Math.random() * 1.4 - 0.7);
                const randomY = 0.6 + (Math.random() * 1.6);

                posX = Math.sin(angleX) * radius;
                posY = randomY;
                posZ = -Math.cos(angleX) * radius;

                validPosition = true;
                for (let j = 0; j < targetNumbers.length; j++) {
                    let other = targetNumbers[j];
                    if (other === mesh || other.position.y > 15) continue; 
                    let dist = Math.sqrt(Math.pow(posX - other.position.x, 2) + Math.pow(posY - other.position.y, 2) + Math.pow(posZ - other.position.z, 2));
                    if (dist < minDistanceBetweenObjects) {
                        validPosition = false;
                        break;
                    }
                }
            }
            mesh.position.set(posX, posY, posZ);
            mesh.userData.baseX = posX;
            mesh.userData.baseY = posY;
        }

        function checkGaze(deltaTime) {
            raycaster.setFromCamera(centerPointer, camera);
            const intersects = raycaster.intersectObjects(targetNumbers);

            if (intersects.length > 0) {
                const hitObject = intersects[0].object;

                if (intersectedObject !== hitObject) {
                    intersectedObject = hitObject;
                    gazeTimer = 0;
                }

                if (hitObject.userData.number === currentTargetNumber) {
                    reticleMesh.material.color.setHex(0x22c55e); 
                } else {
                    reticleMesh.material.color.setHex(0xef4444); 
                }

                gazeTimer += deltaTime;
                let scaleProgress = 1 + (gazeTimer / GAZE_TIME_REQUIRED) * 0.3;
                reticleMesh.scale.set(scaleProgress, scaleProgress, 1);

                if (gazeTimer >= GAZE_TIME_REQUIRED) {
                    handleNumberSelection(intersectedObject);
                    gazeTimer = 0; 
                }
            } else {
                if (intersectedObject !== null) {
                    reticleMesh.scale.set(1, 1, 1);
                    reticleMesh.material.color.setHex(0xffffff); 
                    intersectedObject = null;
                }
                gazeTimer = 0;
            }
        }

        function handleNumberSelection(obj) {
            const selectedNumber = obj.userData.number;
            
            if (selectedNumber === currentTargetNumber) {
                playSound('success');
                showFeedbackOnObject(obj, '✓', '#22c55e');

                obj.position.y += 20; 
                currentTargetNumber++;

                if (currentTargetNumber > maxNumberInLevel) {
                    progressToNextLevel();
                } else {
                    updateUIStatus();
                }
            } else {
                playSound('error');
                showFeedbackOnObject(obj, '✕', '#ef4444');
                relocateTarget(obj);
            }
        }

        function showFeedbackOnObject(obj, symbol, colorStr) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = colorStr; ctx.font = 'bold 90px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(symbol, 64, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const geometry = new THREE.PlaneGeometry(1.0, 1.0);
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide, depthTest: false });
            const feedbackMesh = new THREE.Mesh(geometry, material);
            
            feedbackMesh.position.copy(obj.position);
            feedbackMesh.position.z += 0.1; 
            scene.add(feedbackMesh);

            setTimeout(() => { scene.remove(feedbackMesh); }, 800);
        }

        function progressToNextLevel() {
            updateUIText("TEBRİKLER! YENİ TUR");
            setTimeout(() => {
                if (maxNumberInLevel < 10) {
                    maxNumberInLevel++;
                } else {
                    maxNumberInLevel = 4;
                    isMovementMode = !isMovementMode; 
                }
                generateDynamicTargets();
            }, 1500);
        }

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            const time = clock.getElapsedTime();

            const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
            
            calibratedTarget.copy(rawSensorQuaternion);
            calibratedTarget.multiply(worldTransform);
            calibratedTarget.multiply(new THREE.Quaternion().setFromAxisAngle(zee, -orient));
            calibratedTarget.premultiply(sensorBiasQuaternion);

            currentQuaternion.slerp(calibratedTarget, SMOOTH_FACTOR);
            camera.quaternion.copy(currentQuaternion);

            const targetPosition = new THREE.Vector3(0, 0, -1.4);
            targetPosition.applyQuaternion(camera.quaternion);
            targetPosition.add(camera.position);
            reticleMesh.position.copy(targetPosition);
            reticleMesh.quaternion.copy(camera.quaternion);

            targetNumbers.forEach(mesh => {
                if (isMovementMode && mesh.position.y < 15) { 
                    mesh.position.x = mesh.userData.baseX + Math.sin(time * 1.3 + mesh.userData.seedX) * 0.35;
                    mesh.position.y = mesh.userData.baseY + Math.cos(time * 1.04 + mesh.userData.seedY) * 0.28;
                }
                mesh.lookAt(camera.position.x, mesh.position.y, camera.position.z);
            });

            checkGaze(deltaTime);
            effect.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        document.getElementById('btn-calibrate').addEventListener('touchend', (e) => {
            e.preventDefault();
            sensorBiasQuaternion.copy(currentQuaternion).invert();
        });
    </script>
</body>
</html>
