<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Kognitif Rehabilitasyon - Aşama 2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>VR Kognitif Oyunu - Aşama 2</h2>
        <p>Lütfen telefonu **YATAY (Landscape)** konuma getirin, ardından başlat butonuna basın.</p>
        <button id="start-btn">OYUNU BAŞLAT</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>

    <script>
        let scene, camera, renderer, effect;
        let deviceOrientation = { alpha: 0, beta: 0, gamma: 0 };
        let isOrientationReady = false;

        // Gaze-Pointer (Bakış İmleci) için değişkenler
        let reticle; 

        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');

        startBtn.addEventListener('click', startProject);

        function startProject() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') { initGyro(); }
                    }).catch(console.error);
            } else {
                initGyro();
            }
        }

        function initGyro() {
            window.addEventListener('deviceorientation', onDeviceOrientation, false);
            startScreen.style.display = 'none';
            initThree();
            animate();
        }

        function onDeviceOrientation(event) {
            // Ham derece verilerini radyana çeviriyoruz
            deviceOrientation.alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0;
            deviceOrientation.beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;
            deviceOrientation.gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0;
            isOrientationReady = true;
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            effect = new THREE.StereoEffect(renderer);
            effect.setSize(window.innerWidth, window.innerHeight);
            effect.setEyeSeparation(0.064);

            // Işıklar
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(0, 10, 5);
            scene.add(directionalLight);

            // --- AŞAMA 2: GAZE POINTER (BAKIŞ İMLECİ) EKLEME ---
            // Hastanın baktığı yerin tam ortasında duracak halka şeklinde bir imleç
            const reticleGeometry = new THREE.RingGeometry(0.02, 0.03, 32);
            const reticleMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide,
                depthTest: false // İmlecin nesnelerin arkasında kalmasını engeller
            });
            reticle = new THREE.Mesh(reticleGeometry, reticleMaterial);
            
            // İmleci kameranın tam önüne (Z ekseninde -2 birim uzağa) sabitliyoruz
            reticle.position.set(0, 0, -2);
            camera.add(reticle); // İmleci sahneye değil, kameraya bağlıyoruz ki kafayla birlikte dönsün
            scene.add(camera);

            // Referans Küpleri
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const materials = [
                new THREE.MeshStandardMaterial({color: 0xef4444}), // Ön - Kırmızı
                new THREE.MeshStandardMaterial({color: 0x22c55e}), // Arka - Yeşil
                new THREE.MeshStandardMaterial({color: 0x3b82f6}), // Sağ - Mavi
                new THREE.MeshStandardMaterial({color: 0xeab308})  // Sol - Sarı
            ];
            const positions = [[0, 0, -5], [0, 0, 5], [5, 0, 0], [-5, 0, 0]];
            for(let i=0; i<4; i++) {
                const mesh = new THREE.Mesh(geometry, materials[i]);
                mesh.position.fromArray(positions[i]);
                scene.add(mesh);
            }

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        // --- YENİLENEN QUATERNION COĞRAFİ KİLİT VE YAN EKRAN DÜZELTMESİ ---
        function updateCameraRotation() {
            if (!isOrientationReady) return;

            const alpha = deviceOrientation.alpha;
            const beta = deviceOrientation.beta;
            const gamma = deviceOrientation.gamma;

            // 1. Adım: Telefonun ham jiroskop verisinden bir Euler açısı oluştur (Sıralama: YXZ)
            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');

            // 2. Adım: Cihazın kendi rotasyonunu hesapla
            const q_device = new THREE.Quaternion().setFromEuler(euler);

            // 3. Adım: Telefon yan yatırıldığında (Landscape) eksenlerin yer değiştirmesini düzelten Quaternion matrix
            // Ekranı -90 derece (Z ekseninde) döndürerek jiroskopun sağ/sol dengesini eşitliyoruz.
            const q_screenCorrection = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -Math.PI / 2);

            // 4. Adım: Dünya koordinat sistemi ile cihaz koordinat sistemini eşitleyen son hizalama (-X ekseninde 90 derece başlama açısı)
            const q_worldAlignment = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2);

            // Hepsini birleştirip kameraya atıyoruz
            camera.quaternion.copy(q_worldAlignment);
            camera.quaternion.multiply(q_device);
            camera.quaternion.multiply(q_screenCorrection);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateCameraRotation();
            effect.render(scene, camera);
        }
    </script>
</body>
</html>
