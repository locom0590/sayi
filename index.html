<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Kognitif Rehabilitasyon - Aşama 1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        /* Mobil tarayıcı izin ve başlatma ekranı */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>VR Kognitif Rehabilitasyon Oyunu</h2>
        <p>Lütfen telefonu VR Box gözlüğünüze yerleştirmeden önce "Oyunu Başlat" butonuna basın ve jiroskop iznini onaylayın.</p>
        <button id="start-btn">OYUNU BAŞLAT</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/effects/StereoEffect.js"></script>

    <script>
        // --- Global Değişkenler ---
        let scene, camera, renderer, effect;
        let deviceOrientation = {};
        let isOrientationReady = false;

        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');

        startBtn.addEventListener('click', startProject);

        // --- Başlatma Fonksiyonu (İzin Mekanizması) ---
        function startProject() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS cihazlar için izin isteme
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            initGyro();
                        } else {
                            alert('Jiroskop izni reddedildi. Oyun çalışmayacaktır.');
                        }
                    })
                    .catch(console.error);
            } else {
                // Android ve diğer cihazlar için doğrudan başlatma
                initGyro();
            }
        }

        function initGyro() {
            window.addEventListener('deviceorientation', onDeviceOrientation, false);
            startScreen.style.display = 'none'; // Giriş ekranını gizle
            initThree(); // 3D Dünyayı kur
            animate(); // Döngüyü başlat
        }

        // --- Jiroskop Veri Yakalama ---
        function onDeviceOrientation(event) {
            deviceOrientation.alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0; // Z ekseni ekseni dönmesi
            deviceOrientation.beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;   // X ekseni (eğilme)
            deviceOrientation.gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0; // Y ekseni (sağa/sola yatma)
            isOrientationReady = true;
        }

        // --- Three.js ve Stereo (VR Box) Kurulumu ---
        function initThree() {
            // 1. Sahne
            scene = new THREE.Scene();
            // Hastanın kafa karışıklığını önlemek için sakin bir uzay/arka plan rengi
            scene.background = new THREE.Color(0x0f172a); 

            // 2. Kamera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 0); // Hasta merkezde duruyor

            // 3. Renderer (Oynatıcı)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 4. VR Box StereoEffect (Ekranı ikiye bölen yapı)
            effect = new THREE.StereoEffect(renderer);
            effect.setSize(window.innerWidth, window.innerHeight);
            effect.setEyeSeparation(0.064); // Ortalama insan göz bebeği mesafesi (IPD)

            // 5. Test Amaçlı Referans Objeleri (Hastanın döndüğünü anlaması için etrafa kutular koyuyoruz)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(0, 10, 5);
            scene.add(directionalLight);

            // Etrafa referans küpleri yerleştirme
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const materials = [
                new THREE.MeshStandardMaterial({color: 0xef4444}), // Ön - Kırmızı
                new THREE.MeshStandardMaterial({color: 0x22c55e}), // Arka - Yeşil
                new THREE.MeshStandardMaterial({color: 0x3b82f6}), // Sağ - Mavi
                new THREE.MeshStandardMaterial({color: 0xeab308})  // Sol - Sarı
            ];

            const positions = [
                [0, 0, -5],  // Ön
                [0, 0, 5],   // Arka
                [5, 0, 0],   // Sağ
                [-5, 0, 0]   // Sol
            ];

            for(let i=0; i<4; i++) {
                const mesh = new THREE.Mesh(geometry, materials[i]);
                mesh.position.fromArray(positions[i]);
                scene.add(mesh);
            }

            window.addEventListener('resize', onWindowResize, false);
        }

        // --- Ekran Boyutu Değişimi ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effect.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Quaternion (Gimbal Lock Önleyici) Kamera Güncellemesi ---
        function updateCameraRotation() {
            if (!isOrientationReady) return;

            // Jiroskop Euler açılarından Quaternion nesneleri oluşturuyoruz
            const zee = new THREE.Vector3(0, 0, 1);
            const q0 = new THREE.Quaternion();
            const q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // Cihazı landscape (yatay) moduna kalibre etmek için ek yönlendirme

            const euler = new THREE.Euler();
            // Mobil cihazların rotasyon sırası genelde Z-X'-Y'' (YXZ) şeklindedir
            euler.set(deviceOrientation.beta, deviceOrientation.alpha, -deviceOrientation.gamma, 'YXZ'); 
            
            camera.quaternion.setFromEuler(euler); // Açıları Quaternion'a çevir (Gimbal Lock engellenir)
            camera.quaternion.multiply(q1); // Yatay ekran düzeltmesi uyguluyoruz
        }

        // --- Oyun Döngüsü (Render Loop) ---
        function animate() {
            requestAnimationFrame(animate);

            updateCameraRotation();

            // Standart renderer.render yerine ekranı ikiye bölen effect.render'ı çağırıyoruz
            effect.render(scene, camera);
        }
    </script>
</body>
</html>
